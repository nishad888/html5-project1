<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- AI Add-on: AI generated meta tags -->
    <meta name="description" content="Contact Alex Doe, a Software Engineer and Creative Technologist. Reach out for collaborations, projects, or just to say hi.">
    <meta name="keywords" content="Contact, Software Engineer, Hire Developer, Web Development">
    <meta name="author" content="Alex Doe">
    <title>Contact | Alex Doe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" id="skip-link">Skip to main content</a>
    <header>
        <nav aria-label="Main Navigation">
            <h1>ALEX.DOE</h1>
            <ul>
                <li><a href="index.html">Profile</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main id="main-content">
        <section class="contact-section">
            <h2>Let's Connect</h2>
            <form action="#" method="POST" aria-label="Contact Form">
                <fieldset>
                    <legend class="sr-only" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">Contact Details</legend>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required aria-required="true" placeholder="Jane Doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required aria-required="true" placeholder="jane@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required aria-required="true" placeholder="How can I help you?"></textarea>
                    </div>
                    
                    <button type="submit">Send Message</button>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alex Doe. All rights reserved.</p>
    </footer>
</body>
</html>
